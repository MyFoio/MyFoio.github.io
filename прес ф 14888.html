<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>foio</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #333; overflow: hidden; }
        
        #header { height: 56px; line-height: 56px; background: #00A3E0; color: #fff; font-size: 20px; font-weight: 500; padding: 0 20px; position: absolute; top: 0; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-container { position: absolute; top: 56px; bottom: 60px; width: 100%; background: #fff; display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        
        .closed-message { color: #888; font-size: 18px; line-height: 1.5; max-width: 400px; }
        .closed-message a { color: #00A3E0; text-decoration: none; font-weight: bold; }

        #footer { position: absolute; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid #ddd; display: table; }
        #input-wrap { display: table-cell; width: 80%; vertical-align: middle; padding-left: 10px; }
        #msg-input { width: 100%; border: none; padding: 10px; font-size: 16px; outline: none; background: transparent; }
        #btn-wrap { display: table-cell; width: 20%; vertical-align: middle; padding: 0 10px; }
        #send-btn { width: 100%; background: #ccc; color: #fff; border: none; padding: 10px 5px; font-size: 12px; font-weight: bold; cursor: not-allowed; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="main-screen">
        <div id="header">
            <span id="header-title">foio</span>
        </div>

        <div id="chat-container">
            <div class="closed-message">
                foio закрыт на неопределенный срок, больше подробностей есть в тг канале создателей: <br>
                <a href="https://t.me/foio_channel">foio channel</a>
            </div>
        </div>

        <div id="footer">
            <div id="input-wrap">
                <input type="text" id="msg-input" placeholder="Чат отключен..." disabled>
            </div>
            <div id="btn-wrap">
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

</body>
</html>
